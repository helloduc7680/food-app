<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>今日食运</title>
  <meta name="theme-color" content="#7b2ff7" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="今日食运" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <script>
    // 内联 manifest，避免本地文件找不到 manifest.json
    try {
      const m = { name:'今日食运', short_name:'食运', start_url:'./',
        display:'standalone', background_color:'#06060f', theme_color:'#7b2ff7',
        icons:[{src:'icon.svg',sizes:'any',type:'image/svg+xml'}] };
      const blob = new Blob([JSON.stringify(m)],{type:'application/manifest+json'});
      const link = document.createElement('link');
      link.rel = 'manifest';
      link.href = URL.createObjectURL(blob);
      document.currentScript.before(link);
    } catch(e){}
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: #06060f;
      font-family: 'Nunito', 'ZCOOL KuaiLe', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      font-weight: 800;
      overflow-x: hidden;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: calc(env(safe-area-inset-top,0px) + 60px) 20px
               calc(env(safe-area-inset-bottom,0px) + 40px);
    }

    /* 背景光晕 */
    .orb { position:fixed; border-radius:50%; filter:blur(60px); opacity:.25; pointer-events:none; z-index:0; animation:drift ease-in-out infinite alternate; }
    @media (max-width: 480px) { .orb { filter:blur(40px); opacity:.2; } }
    .orb1 { width:420px;height:420px;background:#7b2ff7;top:-100px;left:-80px;animation-duration:9s; }
    .orb2 { width:360px;height:360px;background:#f72fa7;top:45%;right:-80px;animation-duration:11s;animation-delay:-4s; }
    .orb3 { width:280px;height:280px;background:#f7a12f;bottom:-40px;left:30%;animation-duration:13s;animation-delay:-8s; }
    @keyframes drift { from{transform:translate(0,0)scale(1)}to{transform:translate(16px,-16px)scale(1.05)} }

    /* 语言切换 */
    .lang-switch {
      position: fixed;
      top: calc(env(safe-area-inset-top,0px) + 14px);
      right: 16px;
      z-index: 20;
      display: flex;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      overflow: hidden;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }
    .lang-btn {
      padding: 7px 15px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.4);
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .lang-btn.active { background: rgba(123,47,247,0.75); color: #fff; }

    /* 主容器 */
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 400px;
    }

    /* 标题 */
    .header { text-align: center; }
    .header h1 {
      font-family: 'ZCOOL KuaiLe', 'PingFang SC', sans-serif;
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: 6px;
      background: linear-gradient(135deg,#f9ca24,#f0932b,#e84393);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p { margin-top: 4px; color: rgba(255,255,255,.32); font-size: .78rem; letter-spacing: 2px; font-weight: 700; }

    /* 转盘区 */
    .wheel-section { display: flex; flex-direction: column; align-items: center; }
    .pointer {
      width: 0; height: 0;
      border-left: 13px solid transparent;
      border-right: 13px solid transparent;
      border-top: 26px solid #fff;
      filter: drop-shadow(0 0 8px rgba(255,255,255,.85));
      margin-bottom: -1px;
      z-index: 2;
    }
    .wheel-frame {
      position: relative;
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(255,255,255,.07),
                  0 0 55px rgba(120,50,220,.5),
                  0 20px 60px rgba(0,0,0,.6);
    }
    #wheelCanvas { display: block; border-radius: 50%; }

    /* 中心按钮 */
    .center-btn {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 70px; height: 70px;
      border-radius: 50%;
      background: linear-gradient(145deg,#fff,#ddd);
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 900;
      color: #222;
      letter-spacing: 1px;
      box-shadow: 0 4px 18px rgba(0,0,0,.4), 0 0 0 4px rgba(255,255,255,.1);
      transition: transform .15s, box-shadow .15s;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .center-btn:hover:not(:disabled) {
      transform: translate(-50%,-50%) scale(1.08);
      box-shadow: 0 6px 28px rgba(249,202,36,.7), 0 0 0 4px rgba(255,255,255,.18);
    }
    .center-btn:active:not(:disabled) { transform: translate(-50%,-50%) scale(.95); }
    .center-btn:disabled { opacity: .55; cursor: not-allowed; }

    /* 结果卡 */
    .result-card {
      width: 100%;
      background: rgba(30,20,50,0.85);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 26px;
      padding: 22px 20px 20px;
      text-align: center;
      opacity: 0;
      transform: translateY(24px) scale(.96);
      transition: opacity .45s cubic-bezier(.34,1.4,.64,1),
                  transform .45s cubic-bezier(.34,1.4,.64,1);
      pointer-events: none;
    }
    .result-card.show { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }

    .result-emoji {
      display: block;
      font-size: 3rem;
      margin-bottom: 6px;
      animation: emojiPop .5s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes emojiPop { from{transform:scale(.2)rotate(-20deg);opacity:0}to{transform:scale(1)rotate(0);opacity:1} }

    .result-name {
      font-family: 'ZCOOL KuaiLe', 'PingFang SC', sans-serif;
      font-size: 2.2rem;
      font-weight: 900;
      background: linear-gradient(135deg,#f9ca24,#f0932b,#e84393);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }
    .result-desc { color: rgba(255,255,255,.42); font-size: .82rem; font-weight: 700; margin-bottom: 14px; }

    /* 地图/外卖按钮区 */
    .link-section { display: flex; flex-direction: column; gap: 8px; }
    .link-section + .link-section { margin-top: 10px; }
    .section-label {
      font-size: .7rem;
      font-weight: 900;
      letter-spacing: 2px;
      color: rgba(255,255,255,.3);
      text-align: left;
      padding-left: 4px;
      margin-bottom: 2px;
    }
    .map-btns { display: flex; flex-direction: column; gap: 8px; }
    .map-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 18px;
      border-radius: 50px;
      color: #fff;
      text-decoration: none;
      font-size: .9rem;
      font-weight: 900;
      letter-spacing: .5px;
      transition: transform .18s, filter .18s;
      -webkit-tap-highlight-color: transparent;
    }
    .map-btn:active { transform: scale(.97); }
    .map-btn.amap     { background: linear-gradient(135deg,#00b09b,#38ef7d); box-shadow: 0 4px 14px rgba(0,176,155,.4); }
    .map-btn.gmap     { background: linear-gradient(135deg,#4285f4,#34a853); box-shadow: 0 4px 14px rgba(66,133,244,.4); }
    .map-btn.taobao   { background: linear-gradient(135deg,#00aaff,#0066ff); box-shadow: 0 4px 14px rgba(0,102,255,.4); }
    .map-btn.meituan  { background: linear-gradient(135deg,#ff6000,#ffaa00); box-shadow: 0 4px 14px rgba(255,96,0,.4); }
    .map-btn.jd       { background: linear-gradient(135deg,#e1251b,#ff6b6b); box-shadow: 0 4px 14px rgba(225,37,27,.4); }
    .map-btn.dianping { background: linear-gradient(135deg,#ff4400,#ff7744); box-shadow: 0 4px 14px rgba(255,68,0,.4); }
    .map-btn svg { flex-shrink: 0; }

    .no-map-tip { color: rgba(255,255,255,.3); font-size: .84rem; font-style: italic; }

    /* 历史徽章 */
    .history-badge {
      display: inline-block;
      margin-bottom: 10px;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: .72rem;
      font-weight: 900;
      letter-spacing: 1px;
    }
    .history-badge.today { background: rgba(255,71,87,.25); color: #ff6b81; border: 1px solid rgba(255,71,87,.4); }
    .history-badge.past  { background: rgba(255,165,2,.2);  color: #ffa502; border: 1px solid rgba(255,165,2,.35); }
    .tip { color: rgba(255,255,255,.2); font-size: .68rem; letter-spacing: 1.5px; text-align: center; }

    /* 通道切换 */
    .channel-switch { display:flex; gap:10px; width:100%; }
    .channel-btn {
      flex:1; padding:13px 8px; border-radius:18px;
      border:2px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.05);
      color:rgba(255,255,255,0.45); font-size:.95rem; font-weight:800;
      cursor:pointer; transition:all .2s; letter-spacing:2px;
      -webkit-tap-highlight-color:transparent;
    }
    .channel-btn.active {
      background:linear-gradient(135deg,#7b2ff7,#f72fa7);
      border-color:transparent; color:#fff;
      box-shadow:0 4px 20px rgba(123,47,247,0.45);
    }

    /* 彩带 */
    .confetti-wrap { position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden; }
    .cp { position:absolute;top:-16px;animation:cpFall linear forwards; }
    @keyframes cpFall { to{transform:translate(var(--dx),110vh)rotate(var(--dr));opacity:0} }
  </style>
</head>

</div>

function setLang(l) {
  lang = l;
  document.documentElement.lang = l === 'zh' ? 'zh-CN' : 'en';
  document.getElementById('btnZH').classList.toggle('active', l === 'zh');
  document.getElementById('btnEN').classList.toggle('active', l === 'en');
  applyLang();
  if (typeof rotation !== 'undefined') drawWheel(rotation);
}

function applyLang() {
  const tx = t();
  document.getElementById('titleMain').textContent = tx.title;
  document.getElementById('titleSub').textContent  = tx.sub;
  document.getElementById('tipText').textContent   = tx.tip;
  const btn = document.getElementById('spinBtn');
  if (!animating) btn.textContent = btn.dataset.spun ? tx.respun : tx.spin;
  if (document.getElementById('resultCard').classList.contains('show') && currentFood) {
    renderMapArea(currentFood);
    document.getElementById('rName').textContent = currentFood[lang] || currentFood.zh;
    document.getElementById('rDesc').textContent = currentFood.desc[lang] || currentFood.desc.zh;
  }
}

// ── 历史记录（localStorage，每台设备独立存储7天）────────────
let _histCache = null;
function getHistory() {
  if (_histCache === null) {
    try { _histCache = JSON.parse(localStorage.getItem('food-history') || '[]'); }
    catch { _histCache = []; }
  }
  return _histCache;
}
function saveHistory(food) {
  try {
    const h = getHistory();
    h.push({ zh: food.zh, ts: Date.now() });
    const cutoff = Date.now() - 7 * 864e5;
    _histCache = h.filter(x => x.ts > cutoff);
    localStorage.setItem('food-history', JSON.stringify(_histCache));
  } catch(e) {}
}
function buildRecentMap() {
  const now = Date.now(), cutoff = now - 7 * 864e5, map = {};
  getHistory().filter(h => h.ts > cutoff).forEach(h => {
    const d = Math.floor((now - h.ts) / 864e5);
    if (!(h.zh in map) || map[h.zh] > d) map[h.zh] = d;
  });
  return map;
}
function getLastSeen(foodZh) {
  const map = buildRecentMap();
  return foodZh in map ? map[foodZh] : null;
}
let currentChannel = 'simple';
let activeFoods = foods.filter((_,i) => !simpleIdx.has(i));
let totalW = activeFoods.reduce((s,f) => s + f.w, 0);

let canvas, ctx, CX, CY, R, SIZE, segs, rotation = 0;

function initCanvas() {
  // iOS 本地文件兜底：强制使用屏幕宽度
  const sw = window.screen ? window.screen.width : 0;
  const iw = window.innerWidth || document.documentElement.clientWidth || sw || 375;
  const container = document.getElementById('wheelCanvas').parentElement;
  const rect = container ? container.getBoundingClientRect() : null;
  const maxW = (rect && rect.width > 10) ? rect.width : iw;
  SIZE = Math.max(260, Math.min(320, maxW - 60));
  const dpr    = Math.min(window.devicePixelRatio || 1, 2);

  canvas = document.getElementById('wheelCanvas');
  canvas.style.width  = SIZE + 'px';
  canvas.style.height = SIZE + 'px';
  canvas.width  = SIZE * dpr;
  canvas.height = SIZE * dpr;

  ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  CX = SIZE / 2; CY = SIZE / 2; R = SIZE / 2 - 6;

  rebuildSegs();
}

function drawWheel(rot) {
  if (!ctx) return;
  ctx.clearRect(0, 0, SIZE, SIZE);

  segs.forEach(seg => {
    const sa = seg.sa + rot, ea = seg.ea + rot, arc = ea - sa;

    // 扇形
    ctx.beginPath(); ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, sa, ea); ctx.closePath();
    ctx.fillStyle = seg.color; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1.2; ctx.stroke();

    if (arc < 0.1) return;
    const mid = (sa + ea) / 2;
    ctx.save();
    ctx.translate(CX + Math.cos(mid)*R*.67, CY + Math.sin(mid)*R*.67);
    ctx.rotate(mid + Math.PI / 2);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(255,255,255,0.93)';
    const label = (lang === 'zh' ? seg.zh : seg.en) || seg.zh;
    if (arc >= 0.36) {
      ctx.font = `${Math.min(14, arc*15)}px sans-serif`;
      ctx.fillText(seg.emoji, 0, -9);
      ctx.font = `bold ${Math.min(10, arc*11)}px 'PingFang SC','Microsoft YaHei',sans-serif`;
      ctx.fillText(label.length > 5 ? label.slice(0,5)+'…' : label, 0, 7);
    } else if (arc >= 0.17) {
      ctx.font = `${Math.min(14, arc*20)}px sans-serif`;
      ctx.fillText(seg.emoji, 0, 0);
    }
    ctx.restore();
  });

  // 外圈
  ctx.beginPath(); ctx.arc(CX, CY, R, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.16)'; ctx.lineWidth = 3; ctx.stroke();

  // 中心盘
  ctx.beginPath(); ctx.arc(CX, CY, 42, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(8,8,20,0.6)'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 2; ctx.stroke();
}

// ── 加权随机 ─────────────────────────────────────────────────
function weightedPick() {
  let r = Math.random() * totalW, cum = 0;
  for (let i = 0; i < activeFoods.length; i++) { cum += getWeight(activeFoods[i]); if (r < cum) return i; }
  return activeFoods.length - 1;
}

function rebuildSegs() {
  activeFoods = currentChannel === 'simple'
    ? foods.filter((_,i) => !simpleIdx.has(i))
    : foods.filter((_,i) => simpleIdx.has(i) || sharedIdx.has(i));
  totalW = activeFoods.reduce((s,f) => s + getWeight(f), 0);
  let acc = 0;
  segs = activeFoods.map((f, i) => {
    const w = getWeight(f);
    const arc = w / totalW * Math.PI * 2;
    const s = { ...f, w, sa: acc, ea: acc + arc, color: COLORS[i % COLORS.length] };
    acc += arc;
    return s;
  });
  rotation = 0;
  drawWheel(0);
}

function setChannel(ch) {
  if (currentChannel === ch) return;
  currentChannel = ch;
  document.getElementById('btnSimple').classList.toggle('active', ch === 'simple');
  document.getElementById('btnFeast').classList.toggle('active', ch === 'feast');
  document.getElementById('resultCard').classList.remove('show');
  const btn = document.getElementById('spinBtn');
  btn.textContent = t().spin;
  delete btn.dataset.spun;
  rebuildSegs();
}

// ── 彩带 ─────────────────────────────────────────────────────
function launchConfetti() {
  const wrap = document.getElementById('confetti');
  const clrs = ['#f9ca24','#f0932b','#eb4d4b','#6ab04c','#0984e3','#7952b3','#fd79a8','#55efc4'];
  for (let i = 0; i < 70; i++) {
    const el = document.createElement('div'); el.className = 'cp';
    el.style.cssText = `
      left:${Math.random()*100}%;
      width:${6+Math.random()*8}px; height:${8+Math.random()*10}px;
      border-radius:${Math.random()>.5?'50%':'2px'};
      background:${clrs[i%clrs.length]};
      --dx:${(Math.random()-.5)*180}px;
      --dr:${Math.random()*720-360}deg;
      animation-duration:${1.4+Math.random()*1.4}s;
      animation-delay:${Math.random()*.4}s;
      opacity:1;
    `;
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 3200);
  }
}

// ── 旋转 ─────────────────────────────────────────────────────
function spin() {
  // iOS 兜底：点击按钮时如果还没初始化，强制重新初始化后再转
  if (!ctx || !segs || segs.length === 0) {
    _appStarted = false;
    startApp();
    setTimeout(spin, 600);
    return;
  }
  if (animating) return;
  animating = true;
  const btn = document.getElementById('spinBtn');
  btn.disabled = true;
  btn.textContent = t().spinning;
  document.getElementById('resultCard').classList.remove('show');

  const idx    = weightedPick();
  const seg    = segs[idx];
  currentFood  = activeFoods[idx];

  const pointer    = -Math.PI / 2;
  const midAngle   = (seg.sa + seg.ea) / 2;
  const targetBase = pointer - midAngle;
  const curNorm    = ((rotation    % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  const tgtNorm    = ((targetBase  % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  let delta = tgtNorm - curNorm;
  if (delta <= 0.01) delta += Math.PI * 2;

  const target   = rotation + (5 + Math.floor(Math.random()*3)) * Math.PI*2 + delta;
  const startRot = rotation;
  const t0       = performance.now();
  const easeOut  = x => 1 - Math.pow(1-x, 4);

  requestAnimationFrame(function frame(now) {
    const prog = Math.min((now - t0) / 4800, 1);
    rotation = startRot + (target - startRot) * easeOut(prog);
    drawWheel(rotation);
    if (prog < 1) {
      requestAnimationFrame(frame);
    } else {
      rotation = target;
      animating = false;
      btn.disabled = false;
      btn.textContent = t().respun;
      btn.dataset.spun = '1';
      launchConfetti();
      showResult(currentFood);
    }
  });
}

// ── 地图按钮 ─────────────────────────────────────────────────



const PIN = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none"
  stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
  <circle cx="12" cy="10" r="3"/></svg>`;

function copyKw(kw) {
  try {
    const el = document.createElement('textarea');
    el.value = kw;
    // 保持在视口内，部分安卓浏览器离屏元素无法选中
    el.style.cssText = 'position:fixed;top:0;left:0;width:2px;height:2px;opacity:0.01;';
    document.body.appendChild(el);
    el.focus(); el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
  } catch(e) {}
}

function iosOpenApp(scheme, fallbackUrl, kw, appName) {
  if (kw) { copyKw(kw); showToast('「' + kw + '」已复制 ✓ 打开后长按粘贴'); }
  let left = false;
  const markLeft = () => { left = true; };
  // visibilitychange 在安卓更可靠，blur 作为 iOS 补充
  document.addEventListener('visibilitychange', markLeft, { once: true });
  window.addEventListener('blur', markLeft, { once: true });
  const timer = setTimeout(() => {
    document.removeEventListener('visibilitychange', markLeft);
    window.removeEventListener('blur', markLeft);
    if (!left) {
      if (appName) showToast('跳转失败，请先安装' + appName);
      else if (fallbackUrl) window.location.href = fallbackUrl;
    }
  }, 2000);
  window.location.href = scheme;
}

function openJD(kw) {
  const ua        = navigator.userAgent;
  const appParams = encodeURIComponent(JSON.stringify({
    category: 'jump', des: 'miaosong', keyWord: kw
  }));
  const scheme    = `openapp.jdmobile://virtual?params=${appParams}`;
  const storeAndroid = `https://app.jd.com/`;
  const storeIOS     = `https://apps.apple.com/cn/app/id414245413`;
  copyKw(kw); showToast('「' + kw + '」已复制 ✓ 打开后搜索框长按粘贴');
  if (/Android/i.test(ua)) {
    // intent → openapp.jdmobile scheme，未装App跳应用商店
    window.location.href =
      `intent://virtual?params=${appParams}` +
      `#Intent;scheme=openapp.jdmobile;` +
      `package=com.jingdong.app.mall;` +
      `S.browser_fallback_url=${encodeURIComponent(storeAndroid)};end`;
  } else {
    // iOS：打开京东App秒送页，2s内未跳转=未安装，提示用户
    const timer = setTimeout(() => {
      showToast('跳转失败，请先安装京东App');
    }, 2000);
    window.addEventListener('blur', () => clearTimeout(timer), { once: true });
    window.location.href = scheme;
  }
}

function openTaobao(kw) {
  const ua      = navigator.userAgent;
  const encoded = encodeURIComponent(kw);
  const h5Url   = `https://www.ele.me/`;
  copyKw(kw); showToast('「' + kw + '」已复制 ✓ 打开后搜索框长按粘贴');
  if (/Android/i.test(ua)) {
    // 安卓：唤起失败则回落 H5，避免报错
    iosOpenApp(`eleme://search?keyword=${encoded}`, h5Url, null, null);
  } else {
    iosOpenApp(`eleme://search?keyword=${encoded}`, null, null, '饿了么App');
  }
}

function openMeituan(kw) {
  const ua      = navigator.userAgent;
  const encoded = encodeURIComponent(kw);
  const h5Url   = `https://h5.waimai.meituan.com/waimai/mindex/search?keyword=${encoded}`;
  copyKw(kw); showToast('「' + kw + '」已复制 ✓ 打开后搜索框长按粘贴');
  if (/Android/i.test(ua)) {
    window.location.href = h5Url;
  } else {
    iosOpenApp(`meituanwaimai://search?keyword=${encoded}`, null, null, '美团外卖App');
  }
}


function openDianping(kw) {
  const ua      = navigator.userAgent;
  const encoded = encodeURIComponent(kw);
  const h5Url   = `https://m.dianping.com/search?keyword=${encoded}`;
  copyKw(kw); showToast('「' + kw + '」已复制 ✓ 打开后搜索框长按粘贴');
  if (/Android/i.test(ua)) {
    window.location.href = h5Url;
  } else {
    iosOpenApp(`dianping://search?kw=${encoded}`, h5Url, null, null);
  }
}

function showToast(msg) {
  const el = document.createElement('div');
  el.textContent = msg;
  el.style.cssText = `position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,0.75);color:#fff;padding:10px 18px;border-radius:20px;
    font-size:13px;z-index:9999;pointer-events:none;white-space:nowrap;`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

function renderMapArea(food) {
  const mapArea = document.getElementById('mapArea');
  if (food.kw) {
    const kw          = food.kw[lang] || food.kw.zh;
    const name        = food[lang] || food.zh;
    const amapUrl     = `https://www.amap.com/search?query=${encodeURIComponent(kw)}`;
    const gmapUrl     = `https://www.google.com/maps/search/${encodeURIComponent(kw+'附近')}`;
    const tx = t();
    mapArea.innerHTML = `
      <div class="link-section">
        <div class="section-label">🗺 附近搜索</div>
        <div class="map-btns">
          <a class="map-btn amap"     href="${amapUrl}" target="_blank" rel="noopener">${PIN} ${tx.amap(name)}</a>
          <a class="map-btn gmap"     href="${gmapUrl}" target="_blank" rel="noopener">${PIN} ${tx.gmap(name)}</a>
          <button class="map-btn dianping" data-kw="${kw.replace(/"/g,'&quot;')}" onclick="openDianping(this.dataset.kw)">${PIN} ${tx.dianping(name)}</button>
        </div>
      </div>
      <div class="link-section">
        <div class="section-label">🛵 外卖点餐</div>
        <div class="map-btns">
          <button class="map-btn taobao"  data-kw="${kw.replace(/"/g,'&quot;')}" onclick="openTaobao(this.dataset.kw)">${PIN} ${tx.taobao(name)}</button>
          <button class="map-btn meituan" data-kw="${kw.replace(/"/g,'&quot;')}" onclick="openMeituan(this.dataset.kw)">${PIN} ${tx.meituan(name)}</button>
          <button class="map-btn jd"      data-kw="${kw.replace(/"/g,'&quot;')}" onclick="openJD(this.dataset.kw)">${PIN} ${tx.jd(name)}</button>
        </div>
      </div>`;
  } else {
    const tx  = t();
    const tip = (food.zh === '饿着' || food.en === 'Skip It') ? tx.skip1 : tx.skip2;
    mapArea.innerHTML = `<p class="no-map-tip">${tip}</p>`;
  }
}

function showResult(food) {
  const daysAgo = getLastSeen(food.zh);
  saveHistory(food);
  _histCache = null; // 下次 drawWheel 重新读缓存
  document.getElementById('rEmoji').textContent = food.emoji;
  document.getElementById('rName').textContent  = food[lang] || food.zh;
  document.getElementById('rDesc').textContent  = food.desc[lang] || food.desc.zh;
  const badge = document.getElementById('rHistory');
  if (daysAgo === null) {
    badge.innerHTML = '';
  } else if (daysAgo === 0) {
    badge.innerHTML = '<span class="history-badge today">今天已出现过</span>';
  } else {
    badge.innerHTML = `<span class="history-badge past">${daysAgo}天前出现过</span>`;
  }
  renderMapArea(food);
  setTimeout(() => document.getElementById('resultCard').classList.add('show'), 120);
}

// ── 启动（兼容所有 readyState，防止 load 事件已错过）────────
// 只执行一次，防止多次触发导致 Canvas scale 叠加错位
let _appStarted = false;
function startApp() {
  if (_appStarted) return;
  _appStarted = true;
  try {
    initCanvas();
    applyLang();
    document.getElementById('spinBtn').textContent = t().spin;
    // iOS 本地文件：布局稳定后强制重绘一次
    setTimeout(() => { if (ctx) drawWheel(0); }, 300);
  } catch(e) {
    _appStarted = false;
    setTimeout(startApp, 150);
  }
}

function tryStart() {
  const delay = /iPhone|iPad|iPod/i.test(navigator.userAgent) ? 500 : 0;
  setTimeout(() => requestAnimationFrame(startApp), delay);
}

if (document.readyState === 'complete') {
  tryStart();
} else {
  window.addEventListener('load', tryStart);
  document.addEventListener('DOMContentLoaded', () => setTimeout(startApp, 200));
}

// iOS 兜底：页面加载后显示点击提示，用户点击后强制初始化
window.addEventListener('load', () => {
  setTimeout(() => {
    if (ctx && segs && segs.length > 0) return; // 已经正常初始化，不需要提示
    const overlay = document.createElement('div');
    overlay.id = 'iosOverlay';
    overlay.style.cssText = [
      'position:fixed', 'inset:0', 'z-index:9999',
      'display:flex', 'align-items:center', 'justify-content:center',
      'background:rgba(6,6,15,0.92)'
    ].join(';');
    overlay.innerHTML = `
      <div style="text-align:center;color:#fff;padding:32px;">
        <div style="font-size:48px;margin-bottom:16px;">🎡</div>
        <div style="font-size:20px;font-weight:700;margin-bottom:8px;">今日食运</div>
        <div style="font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:28px;">点击下方按钮启动</div>
        <button onclick="document.getElementById('iosOverlay').remove();_appStarted=false;startApp();"
          style="background:linear-gradient(135deg,#7b2ff7,#f72fa7);border:none;color:#fff;
          padding:14px 36px;border-radius:50px;font-size:16px;font-weight:700;cursor:pointer;">
          启动转盘
        </button>
      </div>`;
    document.body.appendChild(overlay);
  }, 1500);
});


// Service Worker（仅 HTTPS 部署时生效）
if ('serviceWorker' in navigator && location.protocol === 'https:') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
