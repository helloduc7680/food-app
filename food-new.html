<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>今天吃什么？</title>
  <meta name="theme-color" content="#060606" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg:       #060606;
      --gold:     #FFBF00;
      --gold-dk:  #CC8800;
      --blue:     #5BC8FF;
      --white:    #FFFFFF;
      --dim:      rgba(255,255,255,0.55);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--white);
      user-select: none;
    }

    /* ── Confetti ── */
    .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden; }
    .cp { position: absolute; top: -20px; animation: cpFall linear forwards; }
    @keyframes cpFall { to { transform: translate(var(--dx), 110vh) rotate(var(--dr)); opacity: 0; } }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.85); color: #fff; padding: 10px 20px;
      border-radius: 20px; font-size: 13px; z-index: 9999;
      pointer-events: none; white-space: nowrap;
      opacity: 0; transition: opacity 0.3s;
    }
    #toast.show { opacity: 1; }

    /* ─────────────────────────────────────────────
       NAV BAR (shared)
    ───────────────────────────────────────────── */
    .nav-bar {
      position: absolute; top: 0; left: 0; right: 0;
      height: calc(52px + var(--safe-top));
      padding-top: var(--safe-top);
      display: flex; align-items: center; justify-content: space-between;
      padding-left: 20px; padding-right: 20px;
      z-index: 10;
    }
    .nav-pill {
      padding: 7px 16px; border-radius: 20px;
      background: rgba(255,255,255,0.1); border: none;
      color: rgba(255,255,255,0.8); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
      font-family: 'ZCOOL KuaiLe', 'Nunito', sans-serif;
    }
    .nav-pill:hover { background: rgba(255,255,255,0.18); }

    /* ── Language toggle ── */
    .lang-row { display: flex; gap: 5px; }
    .lang-btn {
      padding: 6px 14px; border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.18);
      background: transparent; color: rgba(255,255,255,0.45);
      font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; font-family: inherit;
    }
    .lang-btn.active {
      background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.35);
      color: #fff;
    }

    /* ─────────────────────────────────────────────
       MAIN SCREEN
    ───────────────────────────────────────────── */
    #screen-main {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      background: var(--bg);
      transition: opacity 0.4s, transform 0.4s;
    }
    #screen-main.hidden { opacity: 0; pointer-events: none; transform: scale(0.96); }

    /* ── Top: title zone ── */
    .main-top {
      flex: 0 0 auto;
      padding: calc(var(--safe-top) + 64px) 28px 0;
      position: relative;
      z-index: 1;
    }

    .hero-eyebrow {
      font-size: 11px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 6px;
      opacity: 0.85;
    }

    .hero-title {
      font-size: clamp(2.8rem, 13vw, 5rem);
      font-weight: 900;
      line-height: 1.08;
      color: var(--gold);
      letter-spacing: 2px;
      text-shadow:
        3px 4px 0 rgba(0,0,0,0.7),
        0 0 40px rgba(255,191,0,0.22);
      font-family: 'ZCOOL KuaiLe', 'PingFang SC', 'Noto Sans SC', sans-serif;
    }
    .hero-title .mark {
      color: var(--blue);
      text-shadow: 3px 4px 0 rgba(0,0,0,0.6), 0 0 30px rgba(91,200,255,0.35);
    }

    /* ── Character image zone ── */
    .character-zone {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .character-zone::before {
      content: '';
      position: absolute;
      bottom: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: 55%;
      background: radial-gradient(ellipse at center,
        rgba(255,191,0,0.08) 0%,
        rgba(91,200,255,0.05) 50%,
        transparent 75%);
      pointer-events: none;
    }

    .monsters-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center bottom;
      display: block;
      /* Slightly lift them up */
      padding-bottom: 8px;
    }

    /* Fallback when no image */
    .monsters-fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6rem;
      color: rgba(255,255,255,0.08);
      letter-spacing: 8px;
      padding-bottom: 20px;
    }

    /* ── Bottom controls ── */
    .main-bottom {
      flex: 0 0 auto;
      padding: 16px 20px calc(24px + var(--safe-bot));
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Category chips */
    .channel-row {
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .channel-chip {
      flex: 1;
      padding: 11px 6px;
      border-radius: 50px;
      border: 2px solid transparent;
      font-size: 13px; font-weight: 800;
      cursor: pointer; transition: all 0.22s;
      white-space: nowrap; font-family: inherit;
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* 大吃一顿 — 橙金（金色角色的热烈感） */
    #btnFeast {
      background: rgba(255, 160, 30, 0.1);
      border-color: rgba(255, 160, 30, 0.3);
      color: rgba(255, 175, 60, 0.85);
    }
    #btnFeast.active {
      background: linear-gradient(135deg, #FF9500, #FFBF00);
      border-color: #FF9500;
      color: #1a1000;
      font-weight: 900;
      box-shadow: 0 4px 22px rgba(255,149,0,0.5);
    }
    #btnFeast:hover:not(.active) {
      background: rgba(255,160,30,0.18);
      border-color: rgba(255,160,30,0.55);
      color: #FFB830;
    }

    /* 简单吃吃 — 高级深红 */
    #btnSimple {
      background: rgba(200, 30, 60, 0.1);
      border-color: rgba(200, 30, 60, 0.3);
      color: rgba(220, 80, 100, 0.85);
    }
    #btnSimple.active {
      background: linear-gradient(135deg, #C0162E, #E8334A);
      border-color: #C0162E;
      color: #fff;
      font-weight: 900;
      box-shadow: 0 4px 22px rgba(192,22,46,0.55);
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
    #btnSimple:hover:not(.active) {
      background: rgba(200,30,60,0.18);
      border-color: rgba(200,30,60,0.55);
      color: #E85070;
    }

    /* 喝点什么 — 天蓝（蓝色角色的清爽感） */
    #btnBeverage {
      background: rgba(91, 200, 255, 0.1);
      border-color: rgba(91, 200, 255, 0.28);
      color: rgba(91, 200, 255, 0.8);
    }
    #btnBeverage.active {
      background: linear-gradient(135deg, #29BBFF, #7DDBFF);
      border-color: #29BBFF;
      color: #001a2e;
      font-weight: 900;
      box-shadow: 0 4px 22px rgba(41,187,255,0.5);
    }
    #btnBeverage:hover:not(.active) {
      background: rgba(91,200,255,0.18);
      border-color: rgba(91,200,255,0.5);
      color: #7DDBFF;
    }

    /* CTA button */
    .cta-btn {
      width: 100%;
      padding: 18px;
      border-radius: 18px;
      border: none;
      background: var(--gold);
      color: #111;
      font-size: 19px;
      font-weight: 900;
      cursor: pointer;
      letter-spacing: 1.5px;
      font-family: 'ZCOOL KuaiLe', 'Nunito', sans-serif;
      box-shadow:
        0 6px 24px rgba(255,191,0,0.45),
        0 2px 6px rgba(0,0,0,0.3);
      transition: transform 0.14s, box-shadow 0.14s;
    }
    .cta-btn:hover  { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(255,191,0,0.55), 0 2px 6px rgba(0,0,0,0.3); }
    .cta-btn:active { transform: translateY(1px);  box-shadow: 0 3px 12px rgba(255,191,0,0.35); }

    /* ─────────────────────────────────────────────
       SPIN WHEEL SCREEN
    ───────────────────────────────────────────── */
    #screen-gacha {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center;
      background: radial-gradient(ellipse at 50% 0%, #3a0080 0%, #1a0044 50%, #060018 100%);
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s;
      z-index: 50;
      overflow-y: auto; overflow-x: hidden;
    }
    #screen-gacha.active { opacity: 1; pointer-events: auto; }

    /* Wheel nav */
    .wheel-nav {
      position: absolute; top: 0; left: 0; right: 0;
      height: calc(var(--safe-top) + 52px);
      display: flex; align-items: flex-end; padding: 0 16px 8px;
      z-index: 20;
    }

    /* Wheel screen body */
    .wheel-body {
      width: 100%;
      display: flex; flex-direction: column; align-items: center;
      margin-top: calc(var(--safe-top) + 56px);
      padding-bottom: 40px;
      gap: 0;
    }

    /* Title banner */
    .wheel-banner {
      font-family: 'ZCOOL KuaiLe', sans-serif;
      font-size: 20px; letter-spacing: 3px;
      color: #FFE566;
      text-shadow: 2px 3px 0 #7a3800, 0 0 20px rgba(255,200,0,0.5);
      margin-bottom: 10px;
    }

    /* Pointer */
    .wheel-pointer-wrap {
      position: relative; z-index: 10;
      margin-bottom: -2px;
    }
    .wheel-pointer {
      width: 0; height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 36px solid #FF3B30;
      filter: drop-shadow(0 4px 0 #880000) drop-shadow(0 0 10px rgba(255,59,48,0.8));
    }

    /* Outer carnival ring */
    .wheel-frame {
      position: relative;
      border-radius: 50%;
      padding: 10px;
      background: conic-gradient(
        #FF3B30 0deg, #FF3B30 45deg,
        #FF9500 45deg, #FF9500 90deg,
        #FFCC00 90deg, #FFCC00 135deg,
        #34C759 135deg, #34C759 180deg,
        #00C7BE 180deg, #00C7BE 225deg,
        #007AFF 225deg, #007AFF 270deg,
        #AF52DE 270deg, #AF52DE 315deg,
        #FF2D55 315deg, #FF2D55 360deg
      );
      box-shadow:
        0 0 0 4px rgba(255,255,255,0.9),
        0 12px 50px rgba(0,0,0,0.7),
        0 0 80px rgba(180,80,255,0.25);
    }
    /* Stars on outer ring */
    .wheel-frame::after {
      content: '★ ★ ★ ★ ★ ★ ★ ★';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; color: rgba(255,255,255,0.0);
      border-radius: 50%;
      background: transparent;
    }
    .wheel-inner {
      border-radius: 50%;
      background: #0a0022;
      padding: 0;
      overflow: hidden;
    }

    #wheelCanvas {
      display: block;
      border-radius: 50%;
    }

    /* Center spin button */
    .spin-center-btn {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 68px; height: 68px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.9);
      background: radial-gradient(circle at 38% 32%, #ff7070, #FF3B30 55%, #aa1100);
      box-shadow:
        0 5px 0 #6a0000,
        0 8px 24px rgba(255,59,48,0.7),
        inset 0 3px 6px rgba(255,255,255,0.35);
      font-family: 'Nunito', 'ZCOOL KuaiLe', sans-serif;
      font-size: 17px; font-weight: 900;
      color: #fff;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.6);
      letter-spacing: 1px;
      cursor: pointer;
      z-index: 5;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .spin-center-btn:not(:disabled):active {
      transform: translate(-50%, -47%) scale(0.95);
      box-shadow: 0 2px 0 #6a0000, 0 4px 14px rgba(255,59,48,0.6), inset 0 3px 6px rgba(255,255,255,0.35);
    }
    .spin-center-btn:disabled { opacity: 0.65; cursor: default; }

    /* Result bar */
    .wheel-result-bar {
      margin-top: 16px;
      width: min(340px, 92vw);
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(255,255,255,0.14);
      border-radius: 22px;
      padding: 16px 20px 18px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      opacity: 0; transform: translateY(14px);
      transition: opacity 0.4s, transform 0.4s;
    }
    .wheel-result-bar.visible { opacity: 1; transform: translateY(0); }

    .wheel-result-food {
      font-family: 'ZCOOL KuaiLe', sans-serif;
      font-size: clamp(1.6rem, 7vw, 2.2rem);
      color: #FFE566;
      text-shadow: 2px 2px 0 #7a3800;
      letter-spacing: 2px;
    }
    .wheel-result-actions { display: flex; gap: 10px; }
    .wheel-action {
      padding: 9px 20px; border-radius: 30px;
      font-family: 'ZCOOL KuaiLe', sans-serif;
      font-size: 14px; font-weight: 900; letter-spacing: 0.5px;
      cursor: pointer; border: 2px solid; transition: transform 0.1s;
    }
    .wheel-action:active { transform: scale(0.95); }
    .wheel-action.primary { background: var(--gold); color: #fff; border-color: var(--gold-dk); padding: 12px 28px; font-size: 16px; }
    .wheel-action.secondary {
      background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8);
      border-color: rgba(255,255,255,0.25);
    }

    /* ─────────────────────────────────────────────
       RESULT SCREEN  (retained from original)
    ───────────────────────────────────────────── */
    #screen-result {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none;
      transition: opacity 0.5s;
      z-index: 60;
    }
    #screen-result.active { opacity: 1; pointer-events: auto; }

    .result-top {
      background: var(--bg);
      padding: calc(var(--safe-top) + 56px) 24px 20px;
      flex-shrink: 0;
      overflow-y: auto;
      max-height: 60vh;
    }
    .result-eyebrow {
      font-size: 11px; color: rgba(255,255,255,0.38);
      letter-spacing: 2px; margin-bottom: 6px;
      display: flex; align-items: center; gap: 10px;
      font-family: 'ZCOOL KuaiLe', 'Nunito', sans-serif;
    }
    .result-food-name {
      font-size: clamp(3rem, 13vw, 5.5rem);
      font-weight: 900; line-height: 1;
      font-family: 'ZCOOL KuaiLe', 'Nunito', sans-serif;
      margin-bottom: 8px;
      word-break: break-all;
    }
    .result-desc {
      font-size: 14px; color: rgba(255,255,255,0.5);
      line-height: 1.5; margin-bottom: 12px;
      font-family: 'ZCOOL KuaiLe', 'Nunito', sans-serif;
    }
    .tags-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .tag { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; border: 1.5px solid; }
    .tag.today   { background: rgba(255,71,87,0.15);  color: #ff6b81; border-color: rgba(255,71,87,0.35); }
    .tag.past    { background: rgba(255,165,2,0.15);  color: #ffa502; border-color: rgba(255,165,2,0.3); }
    .tag.meal    { background: rgba(76,175,80,0.15);  color: #66bb6a; border-color: rgba(76,175,80,0.3); }
    .tag.weather { background: rgba(100,200,255,0.1); color: #64c8ff; border-color: rgba(100,200,255,0.25); }

    .result-action-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .action-chip {
      flex: 1; padding: 11px 8px; border-radius: 12px;
      border: 1.5px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.7);
      font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      text-align: center; font-family: 'ZCOOL KuaiLe', 'Nunito', sans-serif;
    }
    .action-chip:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .action-chip.active-chip { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.25); }

    .links-panel { display: none; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    .links-panel.open { display: flex; }
    .link-section-title { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: rgba(255,255,255,0.3); padding-left: 2px; margin-bottom: 4px; }

    .map-btn {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; padding: 12px 16px; border-radius: 13px;
      color: #fff; text-decoration: none;
      font-size: 13px; font-weight: 600;
      cursor: pointer; border: none;
      font-family: 'ZCOOL KuaiLe', 'Nunito', sans-serif;
      transition: transform 0.2s, filter 0.2s;
    }
    .map-btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
    .map-btn:active { transform: scale(0.97); }
    .map-btn.amap     { background: linear-gradient(135deg, #00b09b, #38ef7d); box-shadow: 0 4px 14px rgba(0,176,155,0.35); }
    .map-btn.gmap     { background: linear-gradient(135deg, #4285f4, #34a853); box-shadow: 0 4px 14px rgba(66,133,244,0.35); }
    .map-btn.dianping { background: linear-gradient(135deg, #ff4400, #ff7744); box-shadow: 0 4px 14px rgba(255,68,0,0.35); }
    .map-btn.taobao   { background: linear-gradient(135deg, #00aaff, #0066ff); box-shadow: 0 4px 14px rgba(0,102,255,0.35); }
    .map-btn.meituan  { background: linear-gradient(135deg, #ff6000, #ffaa00); box-shadow: 0 4px 14px rgba(255,96,0,0.35); }
    .map-btn.jd       { background: linear-gradient(135deg, #e1251b, #ff6b6b); box-shadow: 0 4px 14px rgba(225,37,27,0.35); }
    .map-btn.share-btn { background: linear-gradient(135deg, #7b2ff7, #f72fa7); box-shadow: 0 4px 14px rgba(123,47,247,0.4); }
    .no-map-tip { color: rgba(255,255,255,0.35); font-size: 14px; font-style: italic; text-align: center; padding: 8px 0; }

    .result-bottom {
      flex: 1; display: flex; flex-direction: column;
      background: var(--gold);
      transition: background 0.5s;
      position: relative; overflow: hidden;
      min-height: 0;
    }
    .result-emoji-display {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(72px, 20vw, 120px);
      animation: popInEmoji 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes popInEmoji {
      from { transform: scale(0.2) rotate(-20deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .result-bottom-actions { padding: 0 20px calc(20px + var(--safe-bot)); }
    .again-btn {
      width: 100%; padding: 15px;
      border-radius: 14px; border: none;
      background: rgba(0,0,0,0.7); color: #fff;
      font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: 'ZCOOL KuaiLe', 'Nunito', sans-serif;
      transition: opacity 0.2s, transform 0.15s;
    }
    .again-btn:hover { opacity: 0.85; transform: translateY(-1px); }

    /* ─────────────────────────────────────────────
       WEATHER CARD
    ───────────────────────────────────────────── */
    .title-weather-row {
      margin-top: 4px;
    }
    .title-group { flex: 0 0 auto; }

    .weather-strip {
      padding: 10px 28px 0;
    }

    .weather-card {
      width: 100%;
      min-height: 74px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: wcSlideIn 0.7s 0.4s ease both;
      transition: border-color 0.6s;
    }
    @keyframes wcSlideIn {
      from { opacity: 0; transform: translateY(-10px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }
    .weather-card.type-sunny  { border-color: rgba(255,191,0,0.22); }
    .weather-card.type-rainy  { border-color: rgba(91,200,255,0.22); }
    .weather-card.type-snow   { border-color: rgba(200,230,255,0.22); }
    .weather-card.type-storm  { border-color: rgba(180,130,255,0.22); }

    /* Rotating gradient background */
    .wc-bg {
      position: absolute; inset: 0;
      background: conic-gradient(
        from 0deg,
        rgba(255,191,0,0.05) 0%,
        rgba(91,200,255,0.05) 33%,
        rgba(255,191,0,0.02) 66%,
        rgba(91,200,255,0.05) 100%
      );
      animation: wcBgSpin 10s linear infinite;
    }
    @keyframes wcBgSpin { to { transform: rotate(360deg) scale(1.4); } }

    /* Loading state */
    .wc-loading {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
    }
    .wc-orb {
      width: 44px; height: 44px; border-radius: 50%;
      background: conic-gradient(from 0deg, #FFBF00 0%, #5BC8FF 50%, #FFBF00 100%);
      animation: orbSpin 1.4s linear infinite;
      opacity: 0.45;
    }
    @keyframes orbSpin { to { transform: rotate(360deg); } }
    .wc-load-text {
      font-size: 11px; color: rgba(255,255,255,0.35);
      letter-spacing: 1.5px; font-weight: 600;
    }

    /* Content */
    .wc-content {
      display: none; flex-direction: row;
      align-items: center; gap: 12px;
      padding: 10px 18px;
      width: 100%;
      position: relative; z-index: 1;
      animation: wcContentIn 0.5s ease both;
    }
    .wc-content.show { display: flex; }
    .wc-text-group {
      display: flex; flex-direction: column; gap: 1px;
    }
    @keyframes wcContentIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none; }
    }

    /* Icon */
    .wc-icon-wrap {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 4px;
    }
    .wc-glow {
      position: absolute;
      width: 68px; height: 68px; border-radius: 50%;
      filter: blur(18px);
      animation: glowPulse 2.5s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%,100% { opacity: 0.35; transform: scale(0.9); }
      50%      { opacity: 0.75; transform: scale(1.2); }
    }
    .wc-icon {
      font-size: 2.4rem; line-height: 1;
      position: relative; z-index: 2;
      animation: iconFloat 3.5s ease-in-out infinite;
    }
    @keyframes iconFloat {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-5px) scale(1.06); }
    }

    /* Temperature */
    .wc-temp-row { display: flex; align-items: flex-start; gap: 1px; }
    .wc-temp {
      font-size: 2rem; font-weight: 900; line-height: 1;
      color: var(--gold); letter-spacing: -2px;
      font-family: 'Nunito', sans-serif;
      text-shadow: 0 0 24px rgba(255,191,0,0.45);
    }
    .wc-unit {
      font-size: 1rem; font-weight: 700; color: rgba(255,191,0,0.65);
      margin-top: 5px; font-family: 'Nunito', sans-serif;
    }
    .wc-condition {
      font-size: 12px; font-weight: 700; color: var(--blue);
      letter-spacing: 0.5px; margin-top: 3px;
    }
    .wc-feel {
      font-size: 10px; color: rgba(255,255,255,0.35);
      margin-top: 2px; letter-spacing: 0.3px; text-align: left;
    }

    /* Rain drops */
    .rain-drop {
      position: absolute; width: 1.5px; border-radius: 1px;
      background: linear-gradient(to bottom, transparent, rgba(91,200,255,0.65));
      animation: rainFall linear infinite;
    }
    @keyframes rainFall {
      from { transform: translateY(-20px); opacity: 0; }
      15%  { opacity: 1; }
      to   { transform: translateY(180px); opacity: 0; }
    }

    /* Snow flakes */
    .snow-flake {
      position: absolute; color: rgba(210,235,255,0.65);
      animation: snowFall linear infinite;
    }
    @keyframes snowFall {
      from { transform: translateY(-20px) rotate(0deg); opacity: 0; }
      15%  { opacity: 0.8; }
      to   { transform: translateY(190px) rotate(360deg); opacity: 0; }
    }

    /* Sun rays */
    .sun-ray {
      position: absolute; height: 2px; border-radius: 1px;
      background: linear-gradient(to right, transparent, rgba(255,191,0,0.45), transparent);
      transform-origin: left center;
      animation: rayPulse 3s ease-in-out infinite;
    }
    @keyframes rayPulse {
      0%,100% { opacity: 0.2; width: 28px; }
      50%      { opacity: 0.55; width: 38px; }
    }

    /* No data */
    .wc-no-data {
      font-size: 11px; color: rgba(255,255,255,0.25);
      text-align: center; padding: 12px;
      position: relative; z-index: 1;
      letter-spacing: 0.5px; line-height: 1.7;
    }

    /* Tap-to-activate state */
    .wc-tap {
      position: relative; z-index: 1;
      display: flex; flex-direction: row;
      align-items: center; gap: 10px;
      cursor: pointer; padding: 10px 18px;
      width: 100%;
    }
    .wc-tap-icon { font-size: 1.8rem; opacity: 0.55; animation: iconFloat 3.5s ease-in-out infinite; flex-shrink: 0; }
    .wc-tap-hint {
      font-size: 12px; color: rgba(255,255,255,0.3);
      letter-spacing: 0.5px; font-weight: 600;
      text-align: left; line-height: 1.5;
    }
    .wc-tap:hover .wc-tap-hint { color: rgba(255,255,255,0.55); }
    .wc-tap:hover .wc-tap-icon { opacity: 0.8; }

    /* Hide on tiny screens */
    @media (max-width: 340px) { .weather-card { display: none; } }

    /* Mobile portrait adjustments */
    @media (max-width: 480px) {
      .weather-card { min-height: 74px; border-radius: 14px; }
      .wc-icon { font-size: 1.9rem; }
      .wc-temp { font-size: 1.7rem; letter-spacing: -1px; }
      .wc-unit { font-size: 0.75rem; margin-top: 3px; }
      .wc-condition { font-size: 10px; }
      .wc-feel { font-size: 9px; }
      .wc-content { padding: 8px 10px; gap: 1px; }
      .wc-tap-icon { font-size: 1.4rem; }
    }

    /* ── responsive ── */
    @media (max-height: 640px) {
      .main-top { padding-top: calc(var(--safe-top) + 56px); }
      .hero-title { font-size: 2.4rem; }
      .main-bottom { gap: 10px; padding-bottom: calc(16px + var(--safe-bot)); }
      .cta-btn { padding: 15px; font-size: 17px; }
    }
    @media (max-height: 560px) {
      .hero-eyebrow { display: none; }
    }
  </style>
</head>

// ── Weather display ──
function getWeatherInfo(code, temp) {
  const isZh = lang === 'zh';
  if (code === 0) return {
    icon: '☀️', type: 'sunny',
    label: isZh ? '晴天' : 'Sunny',
    feel:  isZh ? (temp > 32 ? '骄阳似火，记得防晒' : temp < 10 ? '晴冷，注意保暖' : '天朗气清，正好出行') : (temp > 32 ? 'Hot & sunny!' : 'Clear skies!'),
    glow: 'rgba(255,191,0,0.28)',
  };
  if ([1,2,3].includes(code)) return {
    icon: code === 1 ? '🌤️' : code === 2 ? '⛅' : '🌥️', type: 'cloudy',
    label: isZh ? '多云' : 'Partly Cloudy',
    feel:  isZh ? '云淡风轻，适合散步' : 'Nice & breezy',
    glow: 'rgba(180,210,255,0.2)',
  };
  if ([45,48].includes(code)) return {
    icon: '🌫️', type: 'cloudy',
    label: isZh ? '有雾' : 'Foggy',
    feel:  isZh ? '雾气朦胧，出行留意能见度' : 'Low visibility, take care',
    glow: 'rgba(200,200,200,0.15)',
  };
  if ([51,53,55,61,63,65,80,81,82].includes(code)) return {
    icon: [51,53,55].includes(code) ? '🌦️' : '🌧️', type: 'rainy',
    label: isZh ? ([51,53,55].includes(code) ? '细雨' : '下雨') : ([51,53,55].includes(code) ? 'Drizzle' : 'Rainy'),
    feel:  isZh ? '雨天适合热汤热锅' : 'Perfect day for hot soup!',
    glow: 'rgba(91,200,255,0.25)',
  };
  if ([71,73,75,77,85,86].includes(code)) return {
    icon: '❄️', type: 'snow',
    label: isZh ? '下雪' : 'Snowing',
    feel:  isZh ? '冰天雪地，火锅暖身' : 'Bundle up & stay warm!',
    glow: 'rgba(190,225,255,0.25)',
  };
  if ([95,96,99].includes(code)) return {
    icon: '⛈️', type: 'storm',
    label: isZh ? '雷暴' : 'Thunderstorm',
    feel:  isZh ? '雷雨交加，宅家最佳' : 'Stay safe indoors!',
    glow: 'rgba(180,130,255,0.3)',
  };
  return {
    icon: '🌥️', type: 'cloudy',
    label: isZh ? '阴天' : 'Overcast',
    feel:  isZh ? '阴沉沉的，换个心情吃顿好的' : 'Gloomy? Treat yourself!',
    glow: 'rgba(180,190,210,0.15)',
  };
}

function onWeatherCardTap() {
  if (currentWeather) return; // already loaded, clicking does nothing
  const tap     = document.getElementById('wcTap');
  const loading = document.getElementById('wcLoading');
  tap.style.display = 'none';
  loading.style.display = 'flex';
  document.getElementById('wcLoadText').textContent = lang === 'zh' ? '定位中…' : 'Locating…';

  getWeather().then(weather => {
    loading.style.display = 'none';
    if (!weather) {
      // restore tap state with failure message
      document.getElementById('wcTapHint').innerHTML = lang === 'zh' ? '获取失败<br>点击重试' : 'Failed<br>tap to retry';
      tap.style.display = 'flex';
      return;
    }
    currentWeather = weather;
    buildSegsWithWeather(getMealType(), weather);
    displayWeather(weather);
  });
}

function displayWeather(weather) {
  if (!weather) return;
  const card     = document.getElementById('weatherCard');
  const loading  = document.getElementById('wcLoading');
  const content  = document.getElementById('wcContent');
  const iconEl   = document.getElementById('wcIcon');
  const tempEl   = document.getElementById('wcTemp');
  const condEl   = document.getElementById('wcCondition');
  const feelEl   = document.getElementById('wcFeel');
  const glowEl   = document.getElementById('wcGlow');

  const info = getWeatherInfo(weather.code, weather.temp);

  // Card accent
  card.className = 'weather-card type-' + info.type;
  glowEl.style.background = info.glow;
  iconEl.textContent = info.icon;
  condEl.textContent  = info.label;
  feelEl.textContent  = info.feel;

  // Temperature count-up
  const target = Math.round(weather.temp);
  const abs = Math.abs(target);
  const sign = target < 0 ? -1 : 1;
  let cur = 0;
  tempEl.textContent = '0';
  const delay = Math.max(18, Math.round(700 / (abs || 1)));
  const timer = setInterval(() => {
    cur++;
    tempEl.textContent = sign * cur;
    if (cur >= abs) { tempEl.textContent = target; clearInterval(timer); }
  }, delay);

  // Clear old particles
  card.querySelectorAll('.rain-drop,.snow-flake,.sun-ray').forEach(e => e.remove());

  // Weather-specific particles
  if (info.type === 'rainy') {
    for (let i = 0; i < 14; i++) {
      const d = document.createElement('div');
      d.className = 'rain-drop';
      d.style.cssText = `left:${Math.random()*100}%;top:0;bottom:0;height:${10+Math.random()*12}px;animation-duration:${0.55+Math.random()*0.45}s;animation-delay:${Math.random()*0.9}s;opacity:${0.3+Math.random()*0.4};`;
      card.appendChild(d);
    }
  } else if (info.type === 'snow') {
    for (let i = 0; i < 9; i++) {
      const s = document.createElement('div');
      s.className = 'snow-flake';
      s.textContent = ['❄','✦','⁕'][i % 3];
      s.style.cssText = `left:${8+Math.random()*84}%;font-size:${8+Math.random()*7}px;animation-duration:${2+Math.random()*2.5}s;animation-delay:${Math.random()*2}s;`;
      card.appendChild(s);
    }
  } else if (info.type === 'sunny') {
    for (let i = 0; i < 8; i++) {
      const r = document.createElement('div');
      r.className = 'sun-ray';
      const a = i * 45;
      r.style.cssText = `left:50%;top:50%;transform-origin:left center;transform:rotate(${a}deg) translateX(28px);animation-delay:${i*0.18}s;`;
      card.appendChild(r);
    }
  }

  // Show
  loading.style.display = 'none';
  content.classList.add('show');
}

let weatherCache = null, weatherCacheTime = 0;
function isRainyWeather(code) {
  return [51,53,55,61,63,65,71,73,75,77,80,81,82,85,86].includes(code);
}
async function getWeather() {
  const now = Date.now();
  if (weatherCache && now - weatherCacheTime < 3600000) return weatherCache;

  let lat, lon;

  // 1. 先尝试 GPS
  try {
    const pos = await new Promise((res, rej) =>
      navigator.geolocation.getCurrentPosition(res, rej, { timeout: 6000 })
    );
    lat = pos.coords.latitude;
    lon = pos.coords.longitude;
  } catch(e) {
    // 2. GPS 失败，改用 IP 定位兜底
    try {
      const loadEl = document.getElementById('wcLoadText');
      if (loadEl) loadEl.textContent = lang === 'zh' ? 'IP定位中…' : 'IP locating…';
      const ipRes = await fetch('https://ipwho.is/');
      const ipData = await ipRes.json();
      if (ipData.success && ipData.latitude) {
        lat = ipData.latitude;
        lon = ipData.longitude;
      }
    } catch(e2) { return null; }
  }

  if (!lat || !lon) return null;

  try {
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=weather_code,temperature_2m&timezone=auto`);
    if (!r.ok) throw new Error();
    const d = await r.json();
    weatherCache = { code: d.current.weather_code, temp: d.current.temperature_2m };
    weatherCacheTime = now;
    return weatherCache;
  } catch(e) { return null; }
}
function getMealType() {
  const h = new Date().getHours();
  if (h >= 5 && h < 11) return 'breakfast';
  if (h >= 11 && h < 15) return 'lunch';
  return 'dinner';
}
let _histCache = null;
function getHistory() {
  if (_histCache === null) {
    try { _histCache = JSON.parse(localStorage.getItem('food-history') || '[]'); }
    catch { _histCache = []; }
  }
  return _histCache;
}
function saveHistory(food) {
  try {
    const h = getHistory();
    h.push({ zh: food.zh, ts: Date.now() });
    _histCache = h.filter(x => x.ts > Date.now() - 7*864e5);
    localStorage.setItem('food-history', JSON.stringify(_histCache));
  } catch(e) {}
}
function getLastSeen(foodZh) {
  const now = Date.now(), cutoff = now - 7*864e5;
  const map = {};
  getHistory().filter(h => h.ts > cutoff).forEach(h => {
    const d = Math.floor((now - h.ts) / 864e5);
    if (!(h.zh in map) || map[h.zh] > d) map[h.zh] = d;
  });
  return foodZh in map ? map[foodZh] : null;
}
function getWeight(f, mealType = null, weather = null) {
  let w = f.zh === '轻食沙拉' ? f.w * 6 : f.w;
  if (!mealType) mealType = getMealType();
  if (f.mealType) {
    if (f.mealType.includes(mealType)) w *= 1.5;
    else if (!f.mealType.includes('all-day')) w *= 0.8;
  }
  if (weather) {
    const kw = f.kw ? (f.kw.zh || '') : '';
    if (isRainyWeather(weather.code) && (kw.includes('汤')||kw.includes('火锅'))) w *= 1.5;
    else if (weather.temp > 30 && f.w <= 3) w *= 1.4;
    else if (weather.temp < 5) w *= 1.3;
  }
  return w;
}

let segs = [], activeFoods = [], totalW = 0;
let _appStarted = false;

function buildSegsWithWeather(mealType, weather) {
  let acc = 0;
  totalW = activeFoods.reduce((s,f) => s + getWeight(f, mealType, weather), 0);
  segs = activeFoods.map(f => {
    const w = getWeight(f, mealType, weather);
    const arc = w / totalW * Math.PI * 2;
    const s = { ...f, w, mealType, weather, sa: acc, ea: acc + arc };
    acc += arc;
    return s;
  });
}

async function rebuildSegs() {
  if (currentChannel === 'simple') {
    activeFoods = foods.filter(f => f.channel === 'simple' || f.channel === 'shared');
  } else if (currentChannel === 'feast') {
    activeFoods = foods.filter(f => f.channel === 'feast' || f.channel === 'shared');
  } else {
    activeFoods = foods.filter(f => f.channel === 'beverage');
  }
  const mealType = getMealType();
  // Build immediately without weather so UI is responsive
  buildSegsWithWeather(mealType, null);
  // Weather fetched only when user taps the card (see onWeatherCardTap)
}

function setChannel(ch) {
  if (currentChannel === ch) return;
  currentChannel = ch;
  ['btnSimple','btnFeast','btnBeverage'].forEach(id => {
    document.getElementById(id).classList.toggle('active',

  const btn = document.getElementById('spinBtn');
  if (btn) { btn.textContent = '转！'; delete btn.dataset.spun; }
  rebuildSegs();
}

const WHEEL_COLORS = [
  '#FF3B30','#FF9500','#FFCC00','#34C759',
  '#00C7BE','#007AFF','#AF52DE','#FF2D55',
  '#FF6B35','#5AC8FA','#4CD964','#FFD60A',
  '#BF5AF2','#30D5C8','#FF453A','#FF9F0A'
];

let wheelSegs   = [];
let wheelRot    = 0;
let wheelSpin   = false;
let wheelRafId  = null;

function buildWheel() {
  const canvas = document.getElementById('wheelCanvas');
  if (!canvas || !activeFoods.length) return;
  const SIZE = Math.min(window.innerWidth - 80, 300);
  canvas.width = canvas.height = SIZE;
  const tw = activeFoods.reduce((s, f) => s + getWeight(f), 0);
  let angle = -Math.PI / 2;
  wheelSegs = activeFoods.map((food, i) => {
    const arc = (getWeight(food) / tw) * Math.PI * 2;
    const seg = { food, sa: angle, ea: angle + arc, color: WHEEL_COLORS[i % WHEEL_COLORS.length] };
    angle += arc;
    return seg;
  });
  drawWheel(wheelRot);
}

function drawWheel(rot) {
  const canvas = document.getElementById('wheelCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const SIZE = canvas.width;
  const CX = SIZE / 2, CY = SIZE / 2, R = SIZE / 2 - 1;
  ctx.clearRect(0, 0, SIZE, SIZE);
  wheelSegs.forEach((seg) => {
    const sa = seg.sa + rot, ea = seg.ea + rot;
    const arc = ea - sa, mid = (sa + ea) / 2;
    ctx.beginPath(); ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, sa, ea); ctx.closePath();
    ctx.fillStyle = seg.color; ctx.fill();
    const textR = R * 0.62;
    ctx.save(); ctx.translate(CX, CY); ctx.rotate(mid);
    const eSize = Math.max(9, Math.min(22, arc * R * 0.30));
    ctx.font = `${eSize}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (arc > 0.10) ctx.fillText(seg.food.emoji || '🍽', textR, 0);
    ctx.restore();
  });
  ctx.beginPath(); ctx.arc(CX, CY, 38, 0, Math.PI * 2);
  ctx.fillStyle = '#0a0022'; ctx.fill();
}

function weightedPick() {
  const tw = activeFoods.reduce((s, f) => s + getWeight(f), 0);
  let r = Math.random() * tw, cum = 0;
  for (let i = 0; i < activeFoods.length; i++) {
    cum += getWeight(activeFoods[i]);
    if (r < cum) return i;
  }
  return activeFoods.length - 1;
}

function doSpin() {
  if (wheelSpin || !activeFoods.length) return;
  wheelSpin = true;
  const btn = document.getElementById('spinBtn');
  const bar = document.getElementById('wheelResultBar');
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  if (bar) bar.classList.remove('visible');
  const pickIdx = weightedPick();
  currentFood = activeFoods[pickIdx];
  const seg = wheelSegs[pickIdx];
  const segMid = (seg.sa + seg.ea) / 2;
  const pointerAngle = -Math.PI / 2;
  const delta = ((pointerAngle - segMid - wheelRot) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
  const endRot = wheelRot + (5 + Math.floor(Math.random() * 3)) * Math.PI * 2 + delta;
  const startRot = wheelRot, duration = 4600, startTime = performance.now();
  function easeOut(t) { return 1 - Math.pow(1 - t, 3.8); }
  function animate(now) {
    const t = Math.min(1, (now - startTime) / duration);
    wheelRot = startRot + (endRot - startRot) * easeOut(t);
    drawWheel(wheelRot);
    if (t < 1) { wheelRafId = requestAnimationFrame(animate); }
    else {
      wheelRot = endRot; wheelSpin = false;
      if (btn) { btn.disabled = false; btn.textContent = '再转！'; }
      const label = document.getElementById('wheelFoodLabel');
      if (label) label.textContent = currentFood.zh;
      if (bar) bar.classList.add('visible');
      launchConfetti(currentFood.color);
    }
  }
  wheelRafId = requestAnimationFrame(animate);
}

function resetWheel() {
  if (wheelRafId) { cancelAnimationFrame(wheelRafId); wheelRafId = null; }
  wheelSpin = false;
  const bar = document.getElementById('wheelResultBar');
  if (bar) bar.classList.remove('visible');
  const btn = document.getElementById('spinBtn');
  if (btn) { btn.disabled = false; btn.textContent = '转！'; }
}

function wheelViewDetail() {
  if (currentFood) showResult(currentFood);
}

// ══════════════════════════════════════════════════════
//  屏幕切换
// ══════════════════════════════════════════════════════
function goToGacha() {
  resetWheel();
  document.getElementById('screen-main').classList.add('hidden');
  document.getElementById('screen-result').classList.remove('active');
  document.getElementById('screen-gacha').classList.add('active');
  rebuildSegs();
  setTimeout(buildWheel, 60);
}
function goToMain() {
  document.getElementById('screen-gacha').classList.remove('active');
  document.getElementById('screen-result').classList.remove('active');
  document.getElementById('screen-main').classList.remove('hidden');
}

// ══════════════════════════════════════════════════════
//  结果显示
// ══════════════════════════════════════════════════════
function togglePanel(panelId, chipId) {
  const panel = document.getElementById(panelId);
  const chip = document.getElementById(chipId);
  const isOpen = panel.classList.contains('open');
  document.querySelectorAll('.links-panel').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.action-chip').forEach(c => c.classList.remove('active-chip'));
  if (!isOpen) { panel.classList.add('open'); chip.classList.add('active-chip'); }
}
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
function copyKw(kw) {
  try {
    const el = document.createElement('textarea');
    el.value = kw; el.style.cssText = 'position:fixed;top:0;left:0;width:2px;height:2px;opacity:0.01;';
    document.body.appendChild(el); el.focus(); el.select();
    document.execCommand('copy'); document.body.removeChild(el);
  } catch(e) {}
}
function iosOpenApp(scheme, fallback, kw, appName) {
  if (kw) { copyKw(kw); showToast('「'+kw+'」已复制 ✓'); }
  let left = false;
  const mark = () => { left = true; };
  document.addEventListener('visibilitychange', mark, {once:true});
  window.addEventListener('blur', mark, {once:true});
  setTimeout(() => {
    document.removeEventListener('visibilitychange', mark);
    window.removeEventListener('blur', mark);
    if (!left && appName) showToast('请先安装' + appName);
    else if (!left && fallback) window.location.href = fallback;
  }, 2000);
  window.location.href = scheme;
}
function openJD(kw) {
  const ua = navigator.userAgent;
  const appParams = encodeURIComponent(JSON.stringify({category:'jump',des:'miaosong',keyWord:kw}));
  copyKw(kw); showToast('「'+kw+'」已复制 ✓ 长按粘贴搜索');
  if (/Android/i.test(ua)) {
    window.location.href = `intent://virtual?params=${appParams}#Intent;scheme=openapp.jdmobile;package=com.jingdong.app.mall;S.browser_fallback_url=${encodeURIComponent('https://app.jd.com/')};end`;
  } else {
    const t2 = setTimeout(() => showToast('请先安装京东App'), 2000);
    window.addEventListener('blur', () => clearTimeout(t2), {once:true});
    window.location.href = `openapp.jdmobile://virtual?params=${appParams}`;
  }
}
function openTaobao(kw) {
  const enc = encodeURIComponent(kw);
  copyKw(kw); showToast('「'+kw+'」已复制 ✓ 长按粘贴搜索');
  iosOpenApp(`eleme://search?keyword=${enc}`, `https://www.ele.me/`, null, null);
}
function openMeituan(kw) {
  const enc = encodeURIComponent(kw);
  copyKw(kw); showToast('「'+kw+'」已复制 ✓ 长按粘贴搜索');
  const ua = navigator.userAgent;
  if (/Android/i.test(ua)) window.location.href = `https://h5.waimai.meituan.com/waimai/mindex/search?keyword=${enc}`;
  else iosOpenApp(`meituanwaimai://search?keyword=${enc}`, null, null, '美团外卖App');
}
function openDianping(kw) {
  const enc = encodeURIComponent(kw);
  copyKw(kw); showToast('「'+kw+'」已复制 ✓ 长按粘贴搜索');
  const ua = navigator.userAgent;
  if (/Android/i.test(ua)) window.location.href = `https://m.dianping.com/search?keyword=${enc}`;
  else iosOpenApp(`dianping://search?kw=${enc}`, `https://m.dianping.com/search?keyword=${enc}`, null, null);
}
function doShare() {
  if (!currentFood) return;
  const name = currentFood[lang] || currentFood.zh;
  const desc = (currentFood.desc[lang]) || currentFood.desc.zh;
  const text = `🥘 ${name} - ${desc}`;
  if (navigator.share) {
    navigator.share({ title: '今天吃什么', text, url: window.location.href }).catch(()=>{});
  } else {
    const ta = document.createElement('textarea');
    ta.value = text + '\n' + window.location.href;
    ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0.01;';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); showToast(lang==='zh'?'分享内容已复制':'Copied to clipboard!'); } catch(e) {}
    document.body.removeChild(ta);
  }
}

const PIN = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;

function buildMapLinks(food) {
  const kw = food.kw[lang] || food.kw.zh;
  const name = food[lang] || food.zh;
  const tx = t();
  const amapUrl = `https://www.amap.com/search?query=${encodeURIComponent(kw)}`;
  const gmapUrl = `https://www.google.com/maps/search/${encodeURIComponent(kw+'附近')}`;
  document.getElementById('mapPanel').innerHTML = `
    <div class="link-section-title">${tx.mapSection}</div>
    <a class="map-btn amap" href="${amapUrl}" target="_blank" rel="noopener">${PIN} ${tx.amap(name)}</a>
    <a class="map-btn gmap" href="${gmapUrl}" target="_blank" rel="noopener">${PIN} ${tx.gmap(name)}</a>
    <button class="map-btn dianping" data-kw="${kw.replace(/"/g,'&quot;')}" onclick="openDianping(this.dataset.kw)">${PIN} ${tx.dianping(name)}</button>
  `;
  document.getElementById('deliveryPanel').innerHTML = `
    <div class="link-section-title">${tx.deliverySection}</div>
    <button class="map-btn taobao"  data-kw="${kw.replace(/"/g,'&quot;')}" onclick="openTaobao(this.dataset.kw)">${PIN}  ${tx.taobao(name)}</button>
    <button class="map-btn meituan" data-kw="${kw.replace(/"/g,'&quot;')}" onclick="openMeituan(this.dataset.kw)">${PIN} ${tx.meituan(name)}</button>
    <button class="map-btn jd"      data-kw="${kw.replace(/"/g,'&quot;')}" onclick="openJD(this.dataset.kw)">${PIN}      ${tx.jd(name)}</button>
  `;
}

function buildTags(food) {
  const tx = t();
  let html = '';
  const daysAgo = getLastSeen(food.zh);
  if (daysAgo === 0) {
    const weekCount = getHistory().filter(h => h.zh === food.zh && h.ts > Date.now()-7*864e5).length - 1;
    html += `<span class="tag today">今天已出现过${weekCount>0?`，本周第${weekCount+1}次`:''}</span>`;
  } else if (daysAgo !== null) {
    html += `<span class="tag past">${daysAgo}天前出现过</span>`;
  }
  if (food.mealType) {
    food.mealType.filter(m => m !== 'all-day').forEach(m => {
      const label = tx[m];
      if (label) html += `<span class="tag meal">${label}</span>`;
    });
  }
  if (currentSeg && currentSeg.weather) {
    const w = currentSeg.weather;
    function wLabel(code) {
      if (code===0) return tx.weatherClear;
      if ([1,2,3].includes(code)) return tx.weatherPartly;
      if ([45,48].includes(code)) return tx.weatherFog;
      if ([51,53,55].includes(code)) return tx.weatherDrizzle;
      if ([61,63,65,71,73,75,77,80,81,82,85,86].includes(code)) return tx.weatherRainDesc;
      if ([95,96,99].includes(code)) return tx.weatherThunder;
      return tx.weatherOvercast;
    }
    html += `<span class="tag weather">${wLabel(w.code)} ${Math.round(w.temp)}°C</span>`;
    const kw = food.kw ? (food.kw.zh||'') : '';
    if (isRainyWeather(w.code) && (kw.includes('汤')||kw.includes('火锅'))) html += `<span class="tag weather">${tx.weatherRainy}</span>`;
    else if (w.temp > 30) html += `<span class="tag weather">${tx.weatherHot}</span>`;
    else if (w.temp < 5) html += `<span class="tag weather">${tx.weatherCold}</span>`;
  }
  return html;
}

function rerenderResult() {
  if (!currentFood) return;
  const food = currentFood;
  const name = food[lang] || food.zh;
  document.getElementById('rName').textContent = name;
  document.getElementById('rDesc').textContent = food.desc[lang] || food.desc.zh;
  document.getElementById('tagsRow').innerHTML = buildTags(food);
  if (food.kw) {
    buildMapLinks(food);
    document.getElementById('actionRow').style.display = 'flex';
    document.getElementById('noMapArea').innerHTML = '';
  } else {
    document.getElementById('mapPanel').innerHTML = '';
    document.getElementById('deliveryPanel').innerHTML = '';
    document.getElementById('actionRow').style.display = 'none';
    const tx = t();
    const tip = (food.zh === '饿着' || food.en === 'Skip It') ? tx.skip1 : tx.skip2;
    document.getElementById('noMapArea').innerHTML = `<p class="no-map-tip">${tip}</p>`;
  }
}

function showResult(food) {
  saveHistory(food); _histCache = null;
  document.getElementById('rEmoji').textContent = food.emoji;
  document.getElementById('resultBottom').style.background = food.color || '#FFBF00';
  rerenderResult();
  document.querySelectorAll('.links-panel').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.action-chip').forEach(c => c.classList.remove('active-chip'));
  document.getElementById('screen-result').classList.add('active');
  document.getElementById('screen-gacha').classList.remove('active');
  document.getElementById('screen-main').classList.add('hidden');
}

// ══════════════════════════════════════════════════════
//  启动
// ══════════════════════════════════════════════════════
function startApp() {
  if (_appStarted) return;
  _appStarted = true;
  try {
    applyLang();
    rebuildSegs();
  } catch(e) { _appStarted = false; setTimeout(startApp, 150); }
}

if (document.readyState === 'complete') { setTimeout(startApp, 0); }
else { window.addEventListener('load', () => setTimeout(startApp, 0)); }
</script>
